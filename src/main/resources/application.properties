spring.application.name=comercio_eletronico
# Configurań§es do Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita o Console do H2 no navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cria as tabelas automaticamente com base nas suas classes @Entity
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no console (opcional, bom para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


